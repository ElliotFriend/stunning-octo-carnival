[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[rpc_endpoints]
base_sepolia = "https://sepolia.base.org"
arc_testnet = "https://rpc.testnet.arc.network"

[etherscan]
# Etherscan V2 unified API — single key works on every supported chain.
# Get a key at https://etherscan.io/myapikey (not basescan.io).
base_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api" }
